    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'navy': '#030408',         /* Rich Obsidian - Deepest Background */
              'light-navy': '#0a0b12',   /* Dark Surface - Card Background */
              'lightest-navy': '#161826',/* Border/Highlight */
              'slate': '#94a3b8',        /* Body Text */
              'light-slate': '#cbd5e1',  /* Secondary Text */
              'lightest-slate': '#f1f5f9',/* Primary Headings */
              'accent': '#8b5cf6',       /* Violet 500 - AI/ML Focus */
              'off-white': '#fafafa',    /* Clean Light Background */
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['Fira Code', 'monospace'],
            }
          }
        }
      }
    </script>
    <style>
      /* Smooth scrolling for anchor links */
      html {
        scroll-behavior: smooth;
      }
      
      /* Subtle mesh gradient for background depth */
      .bg-mesh {
        background-image: 
          radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.05) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.05) 0px, transparent 50%);
      }
      
      .dark .bg-mesh {
        background-image: 
          radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.08) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.08) 0px, transparent 50%);
      }
    </style>
    <script>
      // Set theme class on page load to prevent FOUC, defaulting to dark.
      if (localStorage.theme === 'light') {
        document.documentElement.classList.remove('dark');
      } else {
        document.documentElement.classList.add('dark');
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
